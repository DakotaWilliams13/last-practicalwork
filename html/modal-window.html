<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Window</title>

    <link rel="stylesheet" href="../css/modal-window.css">
    <script defer src="../js/modal-window.js"></script>
</head>
<body>
    <button type="button" class="btn--open">открыть модальное окно</button>

    <div class="modal">
        <button type="button" class="btn--close">закрыть модальное окно</button>
        <div class="modal__wrapper">
            <h2 class="modal_title">Это модельное окно</h2>
        </div>
    </div>
</body>
</html>
